# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: use-tagged-error-class
language: tsx
severity: error
message: "Use Data.TaggedErrorClass instead of extending Error directly"

rule:
  pattern: class $NAME extends Error { $$$BODY }

files:
  - "apps/**/*.ts"
  - "apps/**/*.tsx"
  - "packages/**/*.ts"
  - "packages/**/*.tsx"

note: |
  Custom errors should extend Data.TaggedErrorClass for proper Effect integration.
  TaggedErrorClass provides automatic _tag discrimination, structural equality,
  and works seamlessly with Effect.catchTag.

  Example:
  ```typescript
  // ❌ Bad
  class IssueNotFoundError extends Error {
    constructor(public issueId: string) {
      super(`Issue ${issueId} not found`);
    }
  }

  // ✅ Good
  class IssueNotFoundError extends Data.TaggedErrorClass("IssueNotFoundError")<{
    readonly issueId: IssueId;
  }> {}
  ```

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/node_modules/**"
