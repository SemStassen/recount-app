pre-commit:
  jobs:
    - name: format
      run: bun x oxfmt --write {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
      stage_fixed: true

    - name: lint:ast
      run: bun run lint:ast

pre-push:
  jobs:
    - name: lint
      run: bun run lint

    - name: typecheck
      run: bun run typecheck
